exact = true
forbid_circular_dependencies = true
root_module = "ignore"
exclude = ["tests/**", "convert.py", "throwaway/**"]

# --- Modules ---

[[modules]]
path = "canvit_mlx"
depends_on = [
    "canvit_mlx.config",
    "canvit_mlx.viewpoint",
    "canvit_mlx.glimpse",
    "canvit_mlx.canvit",
    "canvit_mlx.checkpoint",
]

[[modules]]
path = "canvit_mlx.config"
depends_on = []

[[modules]]
path = "canvit_mlx.viewpoint"
depends_on = []

[[modules]]
path = "canvit_mlx.grid"
depends_on = []

[[modules]]
path = "canvit_mlx.rope"
depends_on = []

[[modules]]
path = "canvit_mlx.layer_scale"
depends_on = []

[[modules]]
path = "canvit_mlx.patch_embed"
depends_on = []

[[modules]]
path = "canvit_mlx.vpe"
depends_on = []

[[modules]]
path = "canvit_mlx.glimpse"
depends_on = ["canvit_mlx.grid", "canvit_mlx.viewpoint"]

[[modules]]
path = "canvit_mlx.vit_block"
depends_on = ["canvit_mlx.rope", "canvit_mlx.layer_scale"]

[[modules]]
path = "canvit_mlx.canvas_attention"
depends_on = ["canvit_mlx.rope"]

[[modules]]
path = "canvit_mlx.canvit"
depends_on = [
    "canvit_mlx.vit_block",
    "canvit_mlx.canvas_attention",
    "canvit_mlx.config",
    "canvit_mlx.grid",
    "canvit_mlx.layer_scale",
    "canvit_mlx.patch_embed",
    "canvit_mlx.rope",
    "canvit_mlx.glimpse",
    "canvit_mlx.viewpoint",
    "canvit_mlx.vpe",
]

[[modules]]
path = "canvit_mlx.checkpoint"
depends_on = ["canvit_mlx.canvit", "canvit_mlx.config"]
